services:
  redis:
    image: redis
    container_name: redis_database
    ports:
      - "6379:6379"
    restart: unless-stopped
    logging:
      driver: "none"
  auth:
    build:
      context: .
      dockerfile: ./Travallee-Backend/Services/Auth/Dockerfile
    container_name: auth_service
    ports:
      - "3000:3000"
    env_file:
      - ./Travallee-Backend/Services/Auth/.env
    volumes:
      - ./Travallee-Backend/Services/Auth/src:/app/src
    depends_on:
      - redis
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: ./Travallee-Backend/Services/admin/Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ./Travallee-Backend/Services/admin/.env
    volumes:
      - ./Travallee-Backend/Services/admin/src:/app/src
    depends_on:
      - redis
    restart: unless-stopped

  bookings:
    build:
      context: .
      dockerfile: ./Travallee-Backend/Services/booking/Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - ./Travallee-Backend/Services/booking/.env
    volumes:
      - ./Travallee-Backend/Services/booking/src:/app/src
    depends_on:
      - redis
    restart: unless-stopped

  hotel:
    build:
      context: .
      dockerfile: ./Travallee-Backend/Services/Hotel/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./Travallee-Backend/Services/Hotel/.env
    volumes:
      - ./Travallee-Backend/Services/Hotel/src:/app/src
    depends_on:
      - redis
    restart: unless-stopped


  notifications:
    build:
      context: .
      dockerfile: ./Travallee-Backend/Services/notifications/Dockerfile
    ports:
      - "6000:6000"
    env_file:
      - ./Travallee-Backend/Services/notifications/.env
    volumes:
      - ./Travallee-Backend/Services/notifications/src:/app/src
    depends_on:
      - redis
    restart: unless-stopped

  chat:
    build:
      context: .
      dockerfile: ./Travallee-Backend/Services/chat/Dockerfile
    ports:
      - "6001:6001"
    env_file:
      - ./Travallee-Backend/Services/chat/.env
    volumes:
      - ./Travallee-Backend/Services/chat/src:/app/src
    depends_on:
      - redis
    restart: unless-stopped

